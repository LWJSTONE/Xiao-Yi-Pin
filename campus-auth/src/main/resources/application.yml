server:
  port: 8081

spring:
  application:
    name: campus-auth
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    inetutils:
      preferred-networks: 127.0.0.1
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/campus_job?characterEncoding=utf8&useUnicode=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: '123456'
  redis:
    host: 127.0.0.1
    port: 6379

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: campus-job-jwt-secret-key-2024-very-long-secret-key-for-hmac-sha256
  access-token-expire: 7200000
  refresh-token-expire: 604800000
